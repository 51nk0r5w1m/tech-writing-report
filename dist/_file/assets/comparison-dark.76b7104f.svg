<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="900" fill="#0B1020"/>
  <!-- Title -->
  <text x="80" y="82" fill="#E8EEF9" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Figure 4. Comparative fit for long industrial manuals</text>
  <text x="80" y="118" fill="#92A4C2" font-family="Arial, Helvetica, sans-serif" font-size="20">Higher bars indicate stronger fit for the stated criterion in long, visually structured maintenance documents.</text>
  <!-- Chart area: x=160..1330, y=170..720. Height=550 (5 units * 110px). -->
  <!-- Y-axis -->
  <line x1="160" y1="170" x2="160" y2="720" stroke="#30363D" stroke-width="2"/>
  <!-- X-axis -->
  <line x1="160" y1="720" x2="1340" y2="720" stroke="#30363D" stroke-width="2"/>
  <!-- Y-axis ticks and labels (0–5, step 1, 110px/unit) -->
  <line x1="155" y1="720" x2="165" y2="720" stroke="#30363D" stroke-width="2"/>
  <text x="140" y="725" fill="#7D8590" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="end">0</text>
  <line x1="155" y1="610" x2="165" y2="610" stroke="#30363D" stroke-width="2"/>
  <text x="140" y="615" fill="#7D8590" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="end">1</text>
  <line x1="155" y1="500" x2="165" y2="500" stroke="#30363D" stroke-width="2"/>
  <text x="140" y="505" fill="#7D8590" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="end">2</text>
  <line x1="155" y1="390" x2="165" y2="390" stroke="#30363D" stroke-width="2"/>
  <text x="140" y="395" fill="#7D8590" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="end">3</text>
  <line x1="155" y1="280" x2="165" y2="280" stroke="#30363D" stroke-width="2"/>
  <text x="140" y="285" fill="#7D8590" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="end">4</text>
  <line x1="155" y1="170" x2="165" y2="170" stroke="#30363D" stroke-width="2"/>
  <text x="140" y="175" fill="#7D8590" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="end">5</text>
  <!-- Horizontal grid lines -->
  <line x1="160" y1="610" x2="1340" y2="610" stroke="#1C2433" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="160" y1="500" x2="1340" y2="500" stroke="#1C2433" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="160" y1="390" x2="1340" y2="390" stroke="#1C2433" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="160" y1="280" x2="1340" y2="280" stroke="#1C2433" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="160" y1="170" x2="1340" y2="170" stroke="#1C2433" stroke-width="1" stroke-dasharray="6,4"/>
  <!--
    5 groups: Complete(162), Layout(388), Trace(614), Update(840), Usability(1066)
    Group width=226. Within group: 3 bars (w=52) at offsets +24, +80, +136
    Bar top y = 720 - value*110. value in {1,2,3,4,5}.
    Colors: Keyword=#FF7B72, RAG=#E3B341, PageIndex=#79C0FF
  -->
  <!-- Group 1: Retrieval Completeness  KW=2 RAG=3 PI=5 -->
  <rect x="186" y="500" width="52" height="220" rx="4" fill="#FF7B72" opacity="0.85"/>
  <rect x="242" y="390" width="52" height="330" rx="4" fill="#E3B341" opacity="0.85"/>
  <rect x="298" y="170" width="52" height="550" rx="4" fill="#79C0FF" opacity="0.9"/>
  <text x="268" y="755" fill="#92A4C2" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle">Completeness</text>
  <!-- Group 2: Layout Preservation  KW=1 RAG=1 PI=5 -->
  <rect x="412" y="610" width="52" height="110" rx="4" fill="#FF7B72" opacity="0.85"/>
  <rect x="468" y="610" width="52" height="110" rx="4" fill="#E3B341" opacity="0.85"/>
  <rect x="524" y="170" width="52" height="550" rx="4" fill="#79C0FF" opacity="0.9"/>
  <text x="494" y="755" fill="#92A4C2" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle">Layout</text>
  <!-- Group 3: Traceability  KW=3 RAG=3 PI=5 -->
  <rect x="638" y="390" width="52" height="330" rx="4" fill="#FF7B72" opacity="0.85"/>
  <rect x="694" y="390" width="52" height="330" rx="4" fill="#E3B341" opacity="0.85"/>
  <rect x="750" y="170" width="52" height="550" rx="4" fill="#79C0FF" opacity="0.9"/>
  <text x="720" y="755" fill="#92A4C2" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle">Traceability</text>
  <!-- Group 4: Update Flexibility  KW=5 RAG=5 PI=4 -->
  <rect x="864" y="170" width="52" height="550" rx="4" fill="#FF7B72" opacity="0.85"/>
  <rect x="920" y="170" width="52" height="550" rx="4" fill="#E3B341" opacity="0.85"/>
  <rect x="976" y="280" width="52" height="440" rx="4" fill="#79C0FF" opacity="0.9"/>
  <text x="946" y="755" fill="#92A4C2" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle">Update flexibility</text>
  <!-- Group 5: Usability  KW=2 RAG=3 PI=5 -->
  <rect x="1090" y="500" width="52" height="220" rx="4" fill="#FF7B72" opacity="0.85"/>
  <rect x="1146" y="390" width="52" height="330" rx="4" fill="#E3B341" opacity="0.85"/>
  <rect x="1202" y="170" width="52" height="550" rx="4" fill="#79C0FF" opacity="0.9"/>
  <text x="1172" y="755" fill="#92A4C2" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle">Usability</text>
  <!-- Legend -->
  <rect x="160" y="800" width="24" height="24" rx="4" fill="#FF7B72" opacity="0.85"/>
  <text x="192" y="818" fill="#E8EEF9" font-family="Arial, Helvetica, sans-serif" font-size="18">Keyword search</text>
  <rect x="430" y="800" width="24" height="24" rx="4" fill="#E3B341" opacity="0.85"/>
  <text x="462" y="818" fill="#E8EEF9" font-family="Arial, Helvetica, sans-serif" font-size="18">Conventional RAG</text>
  <rect x="730" y="800" width="24" height="24" rx="4" fill="#79C0FF" opacity="0.9"/>
  <text x="762" y="818" fill="#E8EEF9" font-family="Arial, Helvetica, sans-serif" font-size="18">PageIndex-style retrieval</text>
</svg>
