<svg width="1400" height="780" viewBox="0 0 1400 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#E3B341"/>
    </marker>
  </defs>
  <rect width="1400" height="780" fill="#0B1020"/>
  <!-- Title -->
  <text x="80" y="82" fill="#E8EEF9" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Figure 2. Retrieval workflow comparison for long technical manuals</text>
  <text x="80" y="118" fill="#92A4C2" font-family="Arial, Helvetica, sans-serif" font-size="20">The deepest difference is the assumed shape of the document, not model size or speed.</text>
  <!-- Left panel: OCR + RAG -->
  <rect x="80" y="150" width="570" height="560" rx="24" fill="#10182B" stroke="#23324F" stroke-width="2"/>
  <text x="365" y="194" fill="#5EEAD4" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Conventional OCR + RAG</text>
  <!-- Step 1 -->
  <rect x="112" y="212" width="506" height="72" rx="10" fill="#0B1020" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="365" y="244" fill="#E8EEF9" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" text-anchor="middle">1. Extract text via OCR</text>
  <text x="365" y="268" fill="#92A4C2" font-family="Arial, Helvetica, sans-serif" font-size="15" text-anchor="middle">Layout and visual structure discarded</text>
  <!-- Arrow -->
  <line x1="365" y1="284" x2="365" y2="320" stroke="#E3B341" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Step 2 -->
  <rect x="112" y="326" width="506" height="72" rx="10" fill="#0B1020" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="365" y="358" fill="#E8EEF9" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" text-anchor="middle">2. Chunk passages</text>
  <text x="365" y="382" fill="#92A4C2" font-family="Arial, Helvetica, sans-serif" font-size="15" text-anchor="middle">Arbitrary boundaries break context</text>
  <!-- Arrow -->
  <line x1="365" y1="398" x2="365" y2="434" stroke="#E3B341" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Step 3 -->
  <rect x="112" y="440" width="506" height="72" rx="10" fill="#0B1020" stroke="#5EEAD4" stroke-width="1.5"/>
  <text x="365" y="472" fill="#E8EEF9" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" text-anchor="middle">3. Rank by similarity</text>
  <text x="365" y="496" fill="#92A4C2" font-family="Arial, Helvetica, sans-serif" font-size="15" text-anchor="middle">Nearest-neighbor search over embeddings</text>
  <!-- Arrow to result -->
  <line x1="365" y1="512" x2="365" y2="548" stroke="#E3B341" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Result box left -->
  <rect x="112" y="554" width="506" height="68" rx="10" fill="#1A0808" stroke="#FF7B72" stroke-width="1.5"/>
  <text x="365" y="580" fill="#FF7B72" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Result: Disconnected chunks</text>
  <text x="365" y="606" fill="#FF7B72" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle" opacity="0.85">Missing context, warnings, and relationships</text>
  <!-- Right panel: PageIndex -->
  <rect x="750" y="150" width="570" height="560" rx="24" fill="#10182B" stroke="#23324F" stroke-width="2"/>
  <text x="1035" y="194" fill="#7DD3FC" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" text-anchor="middle">PageIndex-style retrieval</text>
  <!-- Step 1 -->
  <rect x="782" y="212" width="506" height="72" rx="10" fill="#0B1020" stroke="#7DD3FC" stroke-width="1.5"/>
  <text x="1035" y="244" fill="#E8EEF9" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" text-anchor="middle">1. Keep page structure</text>
  <text x="1035" y="268" fill="#92A4C2" font-family="Arial, Helvetica, sans-serif" font-size="15" text-anchor="middle">Hierarchy and layout preserved as index</text>
  <!-- Arrow -->
  <line x1="1035" y1="284" x2="1035" y2="320" stroke="#E3B341" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Step 2 -->
  <rect x="782" y="326" width="506" height="72" rx="10" fill="#0B1020" stroke="#7DD3FC" stroke-width="1.5"/>
  <text x="1035" y="358" fill="#E8EEF9" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" text-anchor="middle">2. Follow hierarchy</text>
  <text x="1035" y="382" fill="#92A4C2" font-family="Arial, Helvetica, sans-serif" font-size="15" text-anchor="middle">Navigate by section, heading, and page</text>
  <!-- Arrow -->
  <line x1="1035" y1="398" x2="1035" y2="434" stroke="#E3B341" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Step 3 -->
  <rect x="782" y="440" width="506" height="72" rx="10" fill="#0B1020" stroke="#7DD3FC" stroke-width="1.5"/>
  <text x="1035" y="472" fill="#E8EEF9" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" text-anchor="middle">3. Reason through manual</text>
  <text x="1035" y="496" fill="#92A4C2" font-family="Arial, Helvetica, sans-serif" font-size="15" text-anchor="middle">Agentic traversal of document tree</text>
  <!-- Arrow to result -->
  <line x1="1035" y1="512" x2="1035" y2="548" stroke="#E3B341" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Result box right -->
  <rect x="782" y="554" width="506" height="68" rx="10" fill="#081A0D" stroke="#56D364" stroke-width="1.5"/>
  <text x="1035" y="580" fill="#56D364" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" text-anchor="middle">Result: Traceable, page-anchored answer</text>
  <text x="1035" y="606" fill="#56D364" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle" opacity="0.85">Complete context with explicit source path</text>
  <!-- VS label -->
  <text x="700" y="452" fill="#E3B341" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" text-anchor="middle">vs</text>
</svg>
